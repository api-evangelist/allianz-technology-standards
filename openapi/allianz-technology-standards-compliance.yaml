openapi: 3.0.3
info:
  title: Allianz Technology Standards Compliance API
  description: >-
    API for checking and documenting compliance with Allianz technology
    standards. Provides endpoints for querying standards definitions, checking
    API compliance against guidelines, and retrieving standard-specific rules
    for pagination, sorting, webhooks, authentication, and architecture patterns.
  version: 1.0.0
  contact:
    name: Allianz Technology Standards
    url: https://developers.allianz-trade.com/docs/api-design-guidelines
  x-generated-from: documentation
servers:
  - url: https://standards.allianz.com/api/v1
    description: Allianz Technology Standards API production server
security:
  - OAuth2: []
tags:
  - name: Standards
    description: Technology standard definitions and retrieval
  - name: Compliance
    description: API compliance checking against Allianz standards
  - name: Guidelines
    description: Specific guideline rules for API design areas
paths:
  /standards:
    get:
      operationId: listStandards
      summary: Allianz Technology Standards List Standards
      description: List all Allianz technology standards with their categories and current versions.
      tags:
        - Standards
      parameters:
        - name: category
          in: query
          required: false
          description: Filter standards by category
          schema:
            type: string
            enum:
              - api-design
              - backend
              - architecture
              - security
              - testing
          example: api-design
        - name: limit
          in: query
          required: false
          description: Maximum number of standards to return
          schema:
            type: integer
            default: 20
          example: 20
      responses:
        '200':
          description: Standards retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StandardList'
              examples:
                ListStandards200Example:
                  summary: Default listStandards 200 response
                  x-microcks-default: true
                  value:
                    total: 12
                    items:
                      - standard_id: "std-500001"
                        name: REST API Pagination Standard
                        category: api-design
                        version: "2.1.0"
                        status: current
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK

  /standards/{standard_id}:
    get:
      operationId: getStandard
      summary: Allianz Technology Standards Get Standard
      description: Retrieve the full definition and rules for a specific technology standard.
      tags:
        - Standards
      parameters:
        - name: standard_id
          in: path
          required: true
          description: Unique identifier of the standard
          schema:
            type: string
          example: "std-500001"
      responses:
        '200':
          description: Standard retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Standard'
              examples:
                GetStandard200Example:
                  summary: Default getStandard 200 response
                  x-microcks-default: true
                  value:
                    standard_id: "std-500001"
                    name: REST API Pagination Standard
                    category: api-design
                    version: "2.1.0"
                    status: current
                    description: "Standard for paginating collection responses in Allianz REST APIs"
                    rules:
                      - rule_id: "pag-001"
                        description: "pageSize parameter must default to 20"
                        severity: required
        '404':
          description: Standard not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK

  /compliance/check:
    post:
      operationId: checkCompliance
      summary: Allianz Technology Standards Check Compliance
      description: >-
        Check an OpenAPI specification against Allianz technology standards and
        return compliance results with violations and recommendations.
      tags:
        - Compliance
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ComplianceCheckRequest'
            examples:
              CheckComplianceRequestExample:
                summary: Default checkCompliance request
                x-microcks-default: true
                value:
                  openapi_url: "https://example.com/openapi.yaml"
                  standard_ids:
                    - "std-500001"
                    - "std-500002"
      responses:
        '200':
          description: Compliance check completed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceResult'
              examples:
                CheckCompliance200Example:
                  summary: Default checkCompliance 200 response
                  x-microcks-default: true
                  value:
                    check_id: "chk-500123"
                    status: completed
                    passed: 18
                    failed: 3
                    warnings: 5
                    violations:
                      - rule_id: "pag-001"
                        description: "pageSize parameter missing default value of 20"
                        severity: required
                        path: "/policies"
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK

  /guidelines/pagination:
    get:
      operationId: getPaginationGuidelines
      summary: Allianz Technology Standards Get Pagination Guidelines
      description: Retrieve the Allianz standard for API pagination including parameters and response headers.
      tags:
        - Guidelines
      responses:
        '200':
          description: Pagination guidelines retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginationGuideline'
              examples:
                GetPaginationGuidelines200Example:
                  summary: Default getPaginationGuidelines 200 response
                  x-microcks-default: true
                  value:
                    guideline_id: "guide-pag-001"
                    name: Pagination Standard
                    version: "2.1.0"
                    parameters:
                      - name: pageSize
                        default: 20
                        description: Number of items per page
                      - name: page
                        default: 1
                        description: Page number starting from 1
                      - name: totalRequired
                        description: Whether to include total count
                    response_headers:
                      - name: Total-Items
                        description: Total number of items
                      - name: Total-Pages
                        description: Total number of pages
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK

  /guidelines/webhooks:
    get:
      operationId: getWebhookGuidelines
      summary: Allianz Technology Standards Get Webhook Guidelines
      description: Retrieve Allianz webhook implementation standards including security requirements and notification types.
      tags:
        - Guidelines
      responses:
        '200':
          description: Webhook guidelines retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WebhookGuideline'
              examples:
                GetWebhookGuidelines200Example:
                  summary: Default getWebhookGuidelines 200 response
                  x-microcks-default: true
                  value:
                    guideline_id: "guide-wh-001"
                    name: Webhook Notification Standard
                    version: "1.3.0"
                    notification_types:
                      - type: technical
                        description: Fires when job completes
                      - type: functional
                        description: Triggers upon business decision
                    security_requirements:
                      - requirement: HTTPS endpoints only
                      - requirement: IP whitelisting required
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK

components:
  securitySchemes:
    OAuth2:
      type: oauth2
      description: OAuth2 client credentials for Allianz standards API
      flows:
        clientCredentials:
          tokenUrl: https://standards.allianz.com/oauth2/token
          scopes:
            standards:read: Read technology standards
            compliance:check: Run compliance checks

  schemas:
    Standard:
      title: Standard
      type: object
      description: An Allianz technology standard definition
      properties:
        standard_id:
          type: string
          description: Unique identifier for the standard
          example: "std-500001"
        name:
          type: string
          description: Human-readable name of the standard
          example: REST API Pagination Standard
        category:
          type: string
          description: Category of the technology standard
          enum:
            - api-design
            - backend
            - architecture
            - security
            - testing
          example: api-design
        version:
          type: string
          description: Current version of the standard
          example: "2.1.0"
        status:
          type: string
          description: Lifecycle status of the standard
          enum:
            - draft
            - current
            - deprecated
            - retired
          example: current
        description:
          type: string
          description: Description of what the standard covers
          example: "Standard for paginating collection responses in Allianz REST APIs"
        rules:
          type: array
          description: List of rules defined by this standard
          items:
            $ref: '#/components/schemas/StandardRule'

    StandardRule:
      title: StandardRule
      type: object
      description: An individual rule within a technology standard
      properties:
        rule_id:
          type: string
          description: Unique identifier for the rule
          example: "pag-001"
        description:
          type: string
          description: Human-readable description of the rule
          example: "pageSize parameter must default to 20"
        severity:
          type: string
          description: Severity level of the rule
          enum:
            - required
            - recommended
            - optional
          example: required

    StandardList:
      title: StandardList
      type: object
      description: Paginated list of technology standards
      properties:
        total:
          type: integer
          description: Total number of standards
          example: 12
        items:
          type: array
          description: List of standard records
          items:
            $ref: '#/components/schemas/Standard'

    ComplianceCheckRequest:
      title: ComplianceCheckRequest
      type: object
      description: Request body for checking API compliance
      required:
        - openapi_url
      properties:
        openapi_url:
          type: string
          format: uri
          description: URL of the OpenAPI spec to check
          example: "https://example.com/openapi.yaml"
        standard_ids:
          type: array
          description: List of standard IDs to check against
          items:
            type: string
          example:
            - "std-500001"
            - "std-500002"

    ComplianceViolation:
      title: ComplianceViolation
      type: object
      description: A compliance violation found during a check
      properties:
        rule_id:
          type: string
          description: Rule that was violated
          example: "pag-001"
        description:
          type: string
          description: Description of the violation
          example: "pageSize parameter missing default value of 20"
        severity:
          type: string
          description: Severity of the violation
          enum:
            - required
            - recommended
            - optional
          example: required
        path:
          type: string
          description: API path where the violation was found
          example: "/policies"

    ComplianceResult:
      title: ComplianceResult
      type: object
      description: Result of a compliance check
      properties:
        check_id:
          type: string
          description: Unique identifier for the compliance check
          example: "chk-500123"
        status:
          type: string
          description: Status of the compliance check
          enum:
            - pending
            - completed
            - failed
          example: completed
        passed:
          type: integer
          description: Number of rules that passed
          example: 18
        failed:
          type: integer
          description: Number of rules that failed
          example: 3
        warnings:
          type: integer
          description: Number of warnings found
          example: 5
        violations:
          type: array
          description: List of compliance violations found
          items:
            $ref: '#/components/schemas/ComplianceViolation'

    PaginationGuideline:
      title: PaginationGuideline
      type: object
      description: Allianz pagination standard definition
      properties:
        guideline_id:
          type: string
          description: Unique identifier for the guideline
          example: "guide-pag-001"
        name:
          type: string
          description: Name of the guideline
          example: Pagination Standard
        version:
          type: string
          description: Version of the guideline
          example: "2.1.0"
        parameters:
          type: array
          description: Standardized query parameters for pagination
          items:
            type: object
        response_headers:
          type: array
          description: Standard response headers for pagination
          items:
            type: object

    WebhookGuideline:
      title: WebhookGuideline
      type: object
      description: Allianz webhook implementation standard definition
      properties:
        guideline_id:
          type: string
          description: Unique identifier for the webhook guideline
          example: "guide-wh-001"
        name:
          type: string
          description: Name of the guideline
          example: Webhook Notification Standard
        version:
          type: string
          description: Version of the guideline
          example: "1.3.0"
        notification_types:
          type: array
          description: Supported webhook notification types
          items:
            type: object
        security_requirements:
          type: array
          description: Security requirements for webhook endpoints
          items:
            type: object

    ErrorResponse:
      title: ErrorResponse
      type: object
      description: Standard error response
      properties:
        error:
          type: string
          description: Error code
          example: not_found
        message:
          type: string
          description: Human-readable error description
          example: "The specified standard_id does not exist"
        request_id:
          type: string
          description: Request identifier for support reference
          example: "req-500999"
