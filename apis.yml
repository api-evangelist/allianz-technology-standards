common:
  - url: https://github.com/Allianz
    type: GitHubOrganization
  - url: https://www.allianz.com/
    type: Website
  - url: https://globaldigitalfactory.allianz.com/
    type: Blog
  - url: rules/allianz-technology-standards-spectral-rules.yml
    type: SpectralRules
  - url: vocabulary/allianz-technology-standards-vocabulary.yaml
    type: Vocabulary
  - url: capabilities/standards-compliance-workflow.yaml
    type: NaftikoCapability
  - type: Features
    data:
      - name: API First Development
        description: >-
          Allianz mandates API-first design using OpenAPI specifications before
          implementation, enabling frontend teams to work with mock servers
          independently.
      - name: Pagination Standards
        description: >-
          Standardized pagination using pageSize (default 20), page (default 1),
          and totalRequired parameters with Total-Items and Total-Pages response
          headers.
      - name: Asynchronous Processing Pattern
        description: >-
          JobID-based pattern for POST/PATCH/DELETE operations returning a job
          identifier that clients poll until status transitions from pending to
          processed.
      - name: Webhook Notification Standards
        description: >-
          Standardized webhook patterns with technical and functional notification
          types, HTTPS requirement, IP whitelisting, and pre-signed URL support.
      - name: OAuth2 Security Standard
        description: >-
          Allianz Trade APIs standardize on OAuth2 client credentials for
          programmatic API authentication across all API products.
      - name: Backend for Frontends Architecture
        description: >-
          BFF pattern where each backend service serves a single frontend,
          enabling clean separation and independent product team decisions.
  - type: UseCases
    data:
      - name: API Standards Compliance
        description: >-
          Verify that Allianz API implementations conform to documented design
          guidelines for pagination, sorting, webhooks, and authentication.
      - name: Developer Onboarding
        description: >-
          Guide new developers on Allianz technology conventions for Java/Kotlin
          backend services, Spring Boot frameworks, and OpenAPI documentation.
      - name: Architecture Review
        description: >-
          Use BFF and API-first standards as criteria for architecture reviews
          and technical decision documentation.
  - type: Integrations
    data:
      - name: OpenAPI Initiative
        description: >-
          Allianz follows the OpenAPI Specification as the standard format for
          API documentation and developer portal integration.
      - name: Swagger UI
        description: >-
          Swagger UI used to make API documentation live and executable from
          OpenAPI specifications.
      - name: Spring Boot
        description: >-
          Spring Boot is the standard framework for delivering Allianz backend
          services with REST, security, caching, and logging.
