type: Index
image: https://kinlane-productions.s3.amazonaws.com/apis-json/apis-json-logo.jpg
description: >-
  A collection of technology standards and guidelines maintained by Allianz for
  software development, API design, architecture, and engineering practices.
  Allianz follows API-first development using OpenAPI specifications, Backend
  for Frontends (BFF) architecture, and standardized patterns for pagination,
  sorting, webhooks, and asynchronous processing.
