  - aid: allianz-technology-standards:allianz-backend-standards
    name: Allianz Backend Development Standards
    tags:
      - Backend
      - Java
      - Kotlin
      - Spring Boot
      - Architecture
    properties:
      - url: https://globaldigitalfactory.allianz.com/blog/finally-talking-about-backend-.html
        type: Documentation
    description: >-
      Allianz Global Digital Factory backend development standards. Uses Java
      and Kotlin with Spring Boot for microservices, API-first approach with
      OpenAPI specifications, Backend for Frontends (BFF) architecture, and
      comprehensive automated testing practices.
    humanURL: https://globaldigitalfactory.allianz.com/blog/finally-talking-about-backend-.html
